services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flora
      POSTGRES_PASSWORD: flora
      POSTGRES_DB: flora
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flora -d flora"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5400:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  flora-core:
    build:
      context: ./flora-core
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://flora:flora@postgres:5432/flora
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  flora-worker:
    build:
      context: ./flora-worker
      dockerfile: Dockerfile

  flora-ui:
    build:
      context: ./flora-ui
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_FLORA_CORE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - flora-core

volumes:
  postgres-data:
