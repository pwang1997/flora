name: Flora Worker Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "flora-worker/**"
      - "flora-shared/**"
      - ".github/workflows/flora-worker-tests.yml"
  push:
    branches:
      - main
    paths:
      - "flora-worker/**"
      - "flora-shared/**"
      - ".github/workflows/flora-worker-tests.yml"
  merge_group:
    branches:
      - main

jobs:
  test:
    name: Run flora-worker mock tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flora-worker

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: flora-worker/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run mock tests
        run: uv run pytest
