name: Flora Core Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "flora-core/**"
      - ".github/workflows/flora-core-tests.yml"
  push:
    branches:
      - main
    paths:
      - "flora-core/**"
      - ".github/workflows/flora-core-tests.yml"
  merge_group:
    branches:
      - main

jobs:
  test:
    name: Run flora-core pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flora-core

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: flora-core/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest
